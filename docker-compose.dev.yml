services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: olamaa
      MYSQL_USER: olamaa
      MYSQL_PASSWORD: 22poPOqw
      MYSQL_ROOT_PASSWORD: qwww29029OOO
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      args:
        INSTALL_DEV: "true"
    env_file:
      - ./backend/.env.docker
    volumes:
      - ./backend:/var/www/html
    ports:
      - "8080:8000"
    command: php artisan serve --host=0.0.0.0 --port=8000
    depends_on:
      - db
      - redis

  web:
    build:
      context: ./web/dashboard/olamaa-dashboard
      target: dev
    env_file:
      - ./web/dashboard/olamaa-dashboard/.env.docker
    volumes:
      - ./web/dashboard/olamaa-dashboard:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: qwww29029OOO
    depends_on:
      - db

volumes:
  db_data:
