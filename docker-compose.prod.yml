services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: olamaa
      MYSQL_USER: olamaa
      MYSQL_PASSWORD: 22poPOqw
      MYSQL_ROOT_PASSWORD: qwww29029OOO

    # Remove public ports for security
    # ports:
    #   - "3306:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pqwww29029OOO" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    # Remove public ports
    # ports:
    #   - "6379:6379"

  backend:
    build:
      context: ./backend
      args:
        INSTALL_DEV: "false"
    env_file:
      - ./backend/.env.docker
    volumes:
      - ./backend:/var/www/html
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www/html:ro
      - ./backend/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - web

  web:
    build:
      context: ./web/dashboard/olamaa-dashboard
      target: prod
      args:
        - NEXT_PUBLIC_API_BASE_URL=http://46.225.180.151/api
    env_file:
      - ./web/dashboard/olamaa-dashboard/.env.docker
    # Remove public ports, nginx will proxy to it
    # ports:
    #   - "3000:3000"
    depends_on:
      - backend

  scheduler:
    build:
      context: ./scheduler_lab
    restart: always
    deploy:
      resources:
        limits:
          memory: 1024M
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  db_data:
