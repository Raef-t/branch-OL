name: Deploy Staging
on:
  push:
    branches: [ staging ] # سيعمل فقط عند الرفع لهذا البرانش

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
             cd /var/www/olamaa/Olamaa_institute_staging
             # التأكد من أننا على برانش staging
             git fetch origin staging
             git checkout staging
             git pull origin staging
             # إعادة التشغيل الآمنة للـ Staging فقط
             sudo docker compose -p olamaa_staging -f docker-compose.staging.yml up -d --build
