server {
  listen 80;
  server_name _;
  root /var/www/html/public;

  index index.php index.html;

  # 1. API, Storage, Documentation and Assets go to Laravel (Staging-Aware)
  location ~ ^/test/(api|storage|up|vendor|docs) {
    # Strip the /test/ prefix before passing to PHP
    rewrite ^/test/(.*)$ /$1 break;

    # Fix Swagger UI internal URLs in the browser (Handles both Absolute and Relative)
    fastcgi_param HTTP_ACCEPT_ENCODING "";
    sub_filter '46.225.180.151/docs' '46.225.180.151/test/docs';
    sub_filter '46.225.180.151/api/oauth2-callback' '46.225.180.151/test/api/oauth2-callback';
    sub_filter '"url": "/docs' '"url": "/test/docs';
    sub_filter 'src="/docs' 'src="/test/docs';
    sub_filter 'href="/docs' 'href="/test/docs';
    sub_filter 'oauth2RedirectUrl: "/api' 'oauth2RedirectUrl: "/test/api';
    sub_filter_once off;
    sub_filter_types text/html application/javascript;

    include fastcgi_params;
    fastcgi_pass backend:9000;
    fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
    fastcgi_param REQUEST_URI $uri?$query_string;
    fastcgi_param DOCUMENT_ROOT /var/www/html/public;
  }

  # 2. All other requests go to Next.js (LOWEST PRIORITY)
  location / {
    proxy_pass http://web:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;
  }

  location ~ \.php$ {
    try_files $uri =404;
    fastcgi_pass backend:9000;
    fastcgi_index index.php;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
    fastcgi_param DOCUMENT_ROOT $realpath_root;
  }

  location ~ /\.(?!well-known).* {
    deny all;
  }
}
